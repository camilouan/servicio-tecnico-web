services:
  - type: web
    name: servicio_tecnico
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py createsu
    startCommand: gunicorn servicio_tecnico.wsgi:application --bind 0.0.0.0:$PORT


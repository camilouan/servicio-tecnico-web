<!DOCTYPE html>
<html>
<head>
<title>Servicio Técnico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/">Servicio Técnico</a>

<div>
{% if user.is_authenticated %}
<span class="text-white me-3">👤 {{ user.username }}</span>
<a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
{% else %}
<a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
<a href="{% url 'registro' %}" class="btn btn-primary btn-sm">Registro</a>
{% endif %}
</div>

</div>
</nav>

<div class="container text-center mt-5">

<h1 class="display-4 fw-bold">
Venta de Accesorios Tecnológicos
</h1>

<p class="lead mt-3">
Celulares, consolas, accesorios gamer y computadores disponibles
para apartar en nuestro local.
</p>

<a href="/productos" class="btn btn-primary btn-lg mt-4">
Ver productos
</a>

</div>

</body>
</html>

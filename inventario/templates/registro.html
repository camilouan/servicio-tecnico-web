<!DOCTYPE html>
<html>
<head>

<title>Registro | Servicio Técnico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0d6efd,#0a58ca);
min-height:100vh;
padding:40px 0;
display:flex;
align-items:flex-start;
justify-content:center;
}

.register-card{
width:450px;
border-radius:12px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="card shadow-lg register-card border-0">

<div class="card-body p-4">

<div class="text-center mb-4">

<div class="logo">
Servicio Técnico
</div>

<p class="text-muted small">
Crear cuenta en el sistema
</p>

</div>

<h4 class="text-center mb-4">
Registro de usuario
</h4>

<form method="POST">

{% csrf_token %}

{% for field in form %}

<div class="mb-3">

<label class="form-label">
{{ field.label }}
</label>

{{ field }}

{% if field.errors %}

<div class="text-danger small">
{{ field.errors }}
</div>

{% endif %}

</div>

{% endfor %}

<button class="btn btn-success w-100">
Crear cuenta
</button>

</form>

<div class="text-center mt-3">

<span class="text-muted">
¿Ya tienes cuenta?
</span>

<a href="{% url 'login' %}">
Inicia sesión
</a>

</div>

<div class="text-center mt-3">

<a href="/" class="text-decoration-none small">
← Volver al inicio
</a>

</div>

</div>

</div>

</body>
</html>
